<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RoboCup Visualizer – Real Madrid vs Barcelona</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #0a0e1a;
      color: #e8ecf0;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    /* ── Header ── */
    header {
      width: 100%;
      max-width: 960px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .title {
      font-size: 1.4rem;
      font-weight: 900;
      letter-spacing: 1px;
    }

    .title span {
      color: #f0c040;
    }

    .scoreboard {
      display: flex;
      align-items: center;
      gap: 14px;
      background: #161d2f;
      border: 1px solid #2a3655;
      border-radius: 12px;
      padding: 8px 20px;
      font-size: 0.85rem;
    }

    .team-name {
      font-weight: 700;
    }

    .team1-name {
      color: #f0c040;
    }

    .team2-name {
      color: #a0c4ff;
    }

    .score {
      font-size: 1.6rem;
      font-weight: 900;
    }

    /* ── Canvas wrapper ── */
    .field-wrapper {
      position: relative;
      width: 100%;
      max-width: 960px;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(0, 200, 100, 0.15);
    }

    canvas {
      display: block;
      width: 100%;
    }

    /* ── Tooltip ── */
    #tooltip {
      position: fixed;
      background: rgba(10, 14, 26, 0.92);
      border: 1px solid #2a3655;
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 0.78rem;
      pointer-events: none;
      display: none;
      z-index: 999;
    }

    /* ── Controls ── */
    .controls {
      width: 100%;
      max-width: 960px;
      background: #161d2f;
      border: 1px solid #2a3655;
      border-radius: 16px;
      padding: 16px 24px;
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .controls-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      background: #1e2a45;
      border: 1px solid #2e3f66;
      border-radius: 8px;
      color: #e8ecf0;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 8px 18px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    .btn:hover {
      background: #27375e;
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn.primary {
      background: #16a34a;
      border-color: #22c55e;
      color: #fff;
    }

    .btn.primary:hover {
      background: #15803d;
    }

    .btn.primary.paused {
      background: #ca8a04;
      border-color: #eab308;
    }

    .round-info {
      font-size: 0.9rem;
      color: #7a90b8;
      margin-left: auto;
    }

    .round-info b {
      color: #e8ecf0;
    }

    input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      height: 6px;
      background: #2a3655;
      border-radius: 3px;
      outline: none;
      cursor: pointer;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #22c55e;
      border: 2px solid #fff;
      cursor: pointer;
    }

    .speed-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.8rem;
      color: #7a90b8;
    }

    .speed-row input {
      width: 120px;
    }

    /* ── Goal overlay ── */
    #goal-banner {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(6px);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      z-index: 10;
    }

    #goal-banner.show {
      display: flex;
    }

    .goal-text {
      font-size: 3.5rem;
      font-weight: 900;
      text-shadow: 0 0 40px currentColor;
      animation: pulse 0.8s ease-in-out infinite alternate;
    }

    .goal-scorer {
      font-size: 1rem;
      color: #ccc;
    }

    @keyframes pulse {
      from {
        transform: scale(1);
      }

      to {
        transform: scale(1.06);
      }
    }

    /* ── Legend ── */
    .legend {
      width: 100%;
      max-width: 960px;
      display: flex;
      gap: 20px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.78rem;
      color: #8a9bb8;
    }

    .legend-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.3);
    }

    .loading {
      text-align: center;
      padding: 60px 20px;
      color: #7a90b8;
      font-size: 1rem;
    }
  </style>
</head>

<body>

  <header>
    <div class="title">⚽ RoboCup <span>Visualizer</span></div>
    <div class="scoreboard">
      <div class="team-name team1-name">Real Madrid</div>
      <div class="score" id="score">0 – 0</div>
      <div class="team-name team2-name">Barcelona</div>
    </div>
  </header>

  <div class="field-wrapper" id="field-wrapper">
    <canvas id="field" width="960" height="480"></canvas>
    <div id="goal-banner">
      <div class="goal-text" id="goal-text">⚽ GOAL!</div>
      <div class="goal-scorer" id="goal-scorer"></div>
    </div>
  </div>

  <div id="tooltip"></div>

  <div class="controls">
    <div class="controls-row">
      <button class="btn" id="btn-back">◀ Step</button>
      <button class="btn primary" id="btn-play">▶ Play</button>
      <button class="btn" id="btn-fwd">Step ▶</button>
      <button class="btn" id="btn-reset">↺ Reset</button>
      <div class="round-info">Round <b id="cur-round">—</b> / <b id="total-rounds">—</b></div>
    </div>
    <input type="range" id="timeline" min="0" value="0" />
    <div class="speed-row">
      🐢 Speed
      <input type="range" id="speed" min="1" max="10" value="4" />
      🚀 <span id="speed-val">4</span>x
    </div>
  </div>

  <div class="legend">
    <div class="legend-item">
      <div class="legend-dot" style="background:#f0c040;border-color:#b8900a"></div>Real Madrid (team1)
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#a0c4ff;border-color:#3070c0"></div>Barcelona (team2)
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#fff;border-color:#888;width:10px;height:10px"></div>Ball
    </div>
    <div class="legend-item">⬡ Goalkeeper &nbsp; ● Forward &nbsp; ■ Midfielder &nbsp; ◆ Defender</div>
  </div>

  <script>
    // ───────────────────────────────────────────
    // Config
    // ───────────────────────────────────────────
    const FIELD_W = 120, FIELD_H = 60;
    const CANVAS_W = 960, CANVAS_H = 480;
    const scaleX = CANVAS_W / FIELD_W;
    const scaleY = CANVAS_H / FIELD_H;

    // Team colours
    const TEAM_COLORS = {
      team1: { fill: '#f0c040', stroke: '#7a5c00', label: 'Real Madrid' },
      team2: { fill: '#4a90d9', stroke: '#1a3670', label: 'Barcelona' },
    };

    const ROLE_SHAPE = {
      forward: 'circle',
      midfield: 'square',
      defender: 'diamond',
      goalkeeper: 'hexagon',
    };

    // ───────────────────────────────────────────
    // State
    // ───────────────────────────────────────────
    let rounds = [];
    let currentIdx = 0;
    let playing = false;
    let animTimer = null;
    let goalBanner = { showing: false };

    // ───────────────────────────────────────────
    // Elements
    // ───────────────────────────────────────────
    const canvas = document.getElementById('field');
    const ctx = canvas.getContext('2d');
    const btnPlay = document.getElementById('btn-play');
    const btnBack = document.getElementById('btn-back');
    const btnFwd = document.getElementById('btn-fwd');
    const btnReset = document.getElementById('btn-reset');
    const timeline = document.getElementById('timeline');
    const speedSlider = document.getElementById('speed');
    const speedVal = document.getElementById('speed-val');
    const curRoundEl = document.getElementById('cur-round');
    const totalRoundsEl = document.getElementById('total-rounds');
    const goalBannerEl = document.getElementById('goal-banner');
    const goalTextEl = document.getElementById('goal-text');
    const goalScorerEl = document.getElementById('goal-scorer');
    const scoreEl = document.getElementById('score');
    const tooltip = document.getElementById('tooltip');

    // ───────────────────────────────────────────
    // Load data
    // ───────────────────────────────────────────
    async function loadLog() {
      try {
        const res = await fetch('game_log.json');
        if (!res.ok) throw new Error(res.status);
        const data = await res.json();
        rounds = data.rounds;
        init();
      } catch (e) {
        document.getElementById('field-wrapper').innerHTML =
          `<div class="loading">
        ⚠️ Could not load <code>game_log.json</code>.<br><br>
        Run the simulation first:<br>
        <code>swipl -g start_one_round -t halt robocup.pl</code><br><br>
        Then serve via: <code>python3 -m http.server 8080</code>
      </div>`;
      }
    }

    function init() {
      timeline.max = rounds.length - 1;
      timeline.value = 0;
      totalRoundsEl.textContent = rounds.length;
      drawRound(0);
    }

    // ───────────────────────────────────────────
    // Drawing
    // ───────────────────────────────────────────
    function px(x) { return x * scaleX; }
    function py(y) { return y * scaleY; }

    function drawField() {
      const g = ctx.createLinearGradient(0, 0, 0, CANVAS_H);
      g.addColorStop(0, '#1a4a2e');
      g.addColorStop(0.5, '#1f5a35');
      g.addColorStop(1, '#1a4a2e');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

      // Stripe pattern
      ctx.fillStyle = 'rgba(255,255,255,0.025)';
      for (let i = 0; i < FIELD_W; i += 10) {
        if (Math.floor(i / 10) % 2 === 0) {
          ctx.fillRect(px(i), 0, px(10), CANVAS_H);
        }
      }

      ctx.strokeStyle = 'rgba(255,255,255,0.55)';
      ctx.lineWidth = 2;

      // Boundary
      ctx.strokeRect(px(2), py(2), px(116), py(56));

      // Centre line
      ctx.beginPath(); ctx.moveTo(px(60), py(2)); ctx.lineTo(px(60), py(58)); ctx.stroke();

      // Centre circle
      ctx.beginPath();
      ctx.arc(px(60), py(30), py(10), 0, Math.PI * 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(px(60), py(30), 4, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.fill();

      // Goal areas  (width=6, height=20)
      ctx.strokeRect(px(2), py(20), px(6), py(20));
      ctx.strokeRect(px(112), py(20), px(6), py(20));

      // Goals (net area)
      ctx.strokeStyle = 'rgba(255,255,255,0.75)';
      ctx.lineWidth = 3;
      ctx.strokeRect(px(0), py(27), px(2), py(6));   // left goal
      ctx.strokeRect(px(118), py(27), px(2), py(6)); // right goal
      ctx.lineWidth = 2;
      ctx.strokeStyle = 'rgba(255,255,255,0.55)';

      // Penalty spots
      drawDot(px(8), py(30), 4, '#ffffffaa');
      drawDot(px(112), py(30), 4, '#ffffffaa');
    }

    function drawDot(x, y, r, color) {
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
    }

    function drawPlayer(p) {
      const x = px(p.x);
      const y = py(p.y);
      const r = 11;
      const tc = TEAM_COLORS[p.team];
      const shape = ROLE_SHAPE[p.role] || 'circle';

      ctx.save();
      ctx.translate(x, y);

      // Shadow
      ctx.beginPath();
      ctx.ellipse(0, 5, r, 4, 0, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.fill();

      ctx.shadowColor = tc.fill;
      ctx.shadowBlur = 10;

      ctx.fillStyle = tc.fill;
      ctx.strokeStyle = tc.stroke;
      ctx.lineWidth = 2;

      switch (shape) {
        case 'circle':
          ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
          break;
        case 'square':
          ctx.fillRect(-r, -r, r * 2, r * 2);
          ctx.strokeRect(-r, -r, r * 2, r * 2);
          break;
        case 'diamond':
          ctx.beginPath();
          ctx.moveTo(0, -r); ctx.lineTo(r, 0); ctx.lineTo(0, r); ctx.lineTo(-r, 0); ctx.closePath();
          ctx.fill(); ctx.stroke();
          break;
        case 'hexagon':
          ctx.beginPath();
          for (let i = 0; i < 6; i++) {
            const angle = (Math.PI / 3) * i - Math.PI / 6;
            const hx = r * Math.cos(angle), hy = r * Math.sin(angle);
            i === 0 ? ctx.moveTo(hx, hy) : ctx.lineTo(hx, hy);
          }
          ctx.closePath(); ctx.fill(); ctx.stroke();
          break;
      }

      ctx.shadowBlur = 0;

      // Initials
      ctx.fillStyle = tc.stroke;
      ctx.font = `bold ${shape === 'square' ? 8 : 7}px Inter`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const initial = p.name.charAt(0).toUpperCase();
      ctx.fillText(initial, 0, 0);

      // Name label
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.font = '7px Inter';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText(p.name, 0, r + 3);

      ctx.restore();
    }

    function drawBall(ball) {
      const x = px(ball.x);
      const y = py(ball.y);

      // Shadow
      ctx.beginPath();
      ctx.ellipse(x, y + 5, 8, 4, 0, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.fill();

      // Glow
      ctx.shadowColor = '#ffe060';
      ctx.shadowBlur = 18;

      // Ball
      ctx.beginPath();
      ctx.arc(x, y, 8, 0, Math.PI * 2);
      const bg = ctx.createRadialGradient(x - 2, y - 2, 1, x, y, 8);
      bg.addColorStop(0, '#fff');
      bg.addColorStop(1, '#ccc');
      ctx.fillStyle = bg;
      ctx.fill();
      ctx.strokeStyle = '#333';
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // Pentagon patches
      ctx.fillStyle = '#222';
      const patches = [[0, -4], [4, 2], [-4, 2]];
      patches.forEach(([ox, oy]) => {
        ctx.beginPath();
        ctx.arc(x + ox, y + oy, 2, 0, Math.PI * 2);
        ctx.fill();
      });

      ctx.shadowBlur = 0;
    }

    function drawRound(idx) {
      if (!rounds.length) return;
      const round = rounds[idx];
      currentIdx = idx;

      ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
      drawField();
      round.players.forEach(drawPlayer);
      drawBall(round.ball);

      curRoundEl.textContent = round.round;
      timeline.value = idx;

      // Check last round for goal
      if (idx === rounds.length - 1) {
        checkGoal(round.ball);
      } else {
        hideGoal();
      }
    }

    // ───────────────────────────────────────────
    // Goal detection
    // ───────────────────────────────────────────
    function checkGoal(ball) {
      if (ball.x >= 120 && ball.y >= 27 && ball.y <= 33) {
        showGoal('⚽ GOAL!', '🏆 Real Madrid scores!', '#f0c040');
        scoreEl.textContent = '1 – 0';
      } else if (ball.x <= 0 && ball.y >= 27 && ball.y <= 33) {
        showGoal('⚽ GOAL!', '🏆 Barcelona scores!', '#4a90d9');
        scoreEl.textContent = '0 – 1';
      }
    }

    function showGoal(text, scorer, color) {
      goalTextEl.textContent = text;
      goalTextEl.style.color = color;
      goalScorerEl.textContent = scorer;
      goalBannerEl.classList.add('show');
      goalBanner.showing = true;
      stopPlayback();
    }

    function hideGoal() {
      goalBannerEl.classList.remove('show');
      goalBanner.showing = false;
    }

    // ───────────────────────────────────────────
    // Playback
    // ───────────────────────────────────────────
    function getInterval() {
      const spd = parseInt(speedSlider.value);
      return Math.max(80, 1000 / spd);
    }

    function startPlayback() {
      if (playing) return;
      if (currentIdx >= rounds.length - 1) {
        currentIdx = 0;
        hideGoal();
      }
      playing = true;
      btnPlay.textContent = '⏸ Pause';
      btnPlay.classList.add('paused');
      function tick() {
        if (!playing) return;
        if (currentIdx < rounds.length - 1) {
          drawRound(currentIdx + 1);
          animTimer = setTimeout(tick, getInterval());
        } else {
          stopPlayback();
        }
      }
      animTimer = setTimeout(tick, getInterval());
    }

    function stopPlayback() {
      playing = false;
      clearTimeout(animTimer);
      btnPlay.textContent = '▶ Play';
      btnPlay.classList.remove('paused');
    }

    // ───────────────────────────────────────────
    // Controls
    // ───────────────────────────────────────────
    btnPlay.addEventListener('click', () => {
      if (playing) stopPlayback(); else startPlayback();
    });

    btnBack.addEventListener('click', () => {
      stopPlayback();
      hideGoal();
      if (currentIdx > 0) drawRound(currentIdx - 1);
    });

    btnFwd.addEventListener('click', () => {
      stopPlayback();
      if (currentIdx < rounds.length - 1) drawRound(currentIdx + 1);
      else checkGoal(rounds[currentIdx].ball);
    });

    btnReset.addEventListener('click', () => {
      stopPlayback();
      hideGoal();
      scoreEl.textContent = '0 – 0';
      drawRound(0);
    });

    timeline.addEventListener('input', () => {
      stopPlayback();
      hideGoal();
      drawRound(parseInt(timeline.value));
    });

    speedSlider.addEventListener('input', () => {
      speedVal.textContent = speedSlider.value;
    });

    // ───────────────────────────────────────────
    // Tooltip on hover
    // ───────────────────────────────────────────
    canvas.addEventListener('mousemove', (e) => {
      if (!rounds.length) return;
      const rect = canvas.getBoundingClientRect();
      const scaleXr = CANVAS_W / rect.width;
      const scaleYr = CANVAS_H / rect.height;
      const mx = (e.clientX - rect.left) * scaleXr;
      const my = (e.clientY - rect.top) * scaleYr;

      const round = rounds[currentIdx];
      let found = null;
      for (const p of round.players) {
        const dx = px(p.x) - mx;
        const dy = py(p.y) - my;
        if (Math.sqrt(dx * dx + dy * dy) < 14) { found = p; break; }
      }

      if (found) {
        tooltip.style.display = 'block';
        tooltip.style.left = (e.clientX + 14) + 'px';
        tooltip.style.top = (e.clientY - 10) + 'px';
        const tc = TEAM_COLORS[found.team];
        tooltip.innerHTML =
          `<b style="color:${tc.fill}">${found.name}</b><br>` +
          `${found.team} · ${found.role}<br>` +
          `pos (${found.x}, ${found.y})`;
      } else {
        tooltip.style.display = 'none';
      }
    });

    canvas.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });

    // ───────────────────────────────────────────
    // Boot
    // ───────────────────────────────────────────
    loadLog();
  </script>
</body>

</html>
